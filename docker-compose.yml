services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --ping=true
      - --ping.entrypoint=web
    ports:
      - "${TRAEFIK_HTTP_PORT}:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Frontend__Origin: ${FRONTEND_ORIGIN}
      RateLimiting__AuthLogin__PermitLimit: ${RATE_LIMIT_AUTH_LOGIN_PERMIT_LIMIT:-5}
      RateLimiting__AuthLogin__WindowSeconds: ${RATE_LIMIT_AUTH_LOGIN_WINDOW_SECONDS:-60}
      RateLimiting__AuthSignup__PermitLimit: ${RATE_LIMIT_AUTH_SIGNUP_PERMIT_LIMIT:-3}
      RateLimiting__AuthSignup__WindowSeconds: ${RATE_LIMIT_AUTH_SIGNUP_WINDOW_SECONDS:-300}
      LoginSecurity__MaxFailedAttempts: ${LOGIN_SECURITY_MAX_FAILED_ATTEMPTS:-5}
      LoginSecurity__AttemptWindowSeconds: ${LOGIN_SECURITY_ATTEMPT_WINDOW_SECONDS:-600}
      LoginSecurity__LockoutDurationSeconds: ${LOGIN_SECURITY_LOCKOUT_DURATION_SECONDS:-900}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:8080/health/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - backend_dataprotection_keys:/root/.aspnet/DataProtection-Keys
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=PathPrefix(`/api`) || PathPrefix(`/health`) || PathPrefix(`/swagger`)
      - traefik.http.routers.backend.entrypoints=web
      - traefik.http.routers.backend.priority=100
      - traefik.http.services.backend.loadbalancer.server.port=8080

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=PathPrefix(`/`)
      - traefik.http.routers.frontend.entrypoints=web
      - traefik.http.routers.frontend.priority=1
      - traefik.http.services.frontend.loadbalancer.server.port=80

volumes:
  postgres_data:
  backend_dataprotection_keys:
